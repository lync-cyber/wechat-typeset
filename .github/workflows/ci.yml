name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# GitHub forces JS actions onto Node 24 from 2026-06-02 and removes Node 20
# on 2026-09-16. Opt in early to suppress deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Run tests
        run: npm test
