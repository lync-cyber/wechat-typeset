name: E2E (Playwright · Mobile)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# GitHub forces JS actions onto Node 24 from 2026-06-02 and removes Node 20
# on 2026-09-16. Opt in early to suppress deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only on CI)
        run: npx playwright install --with-deps chromium

      - name: Build samples (playwright webServer 启动 vite dev 前需要)
        run: npm run build:samples

      - name: Run Playwright tests (mobile-chromium only)
        run: npx playwright test --project=mobile-chromium

      - name: Upload playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
